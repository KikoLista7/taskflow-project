<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis tareas</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  darkMode: 'class'
}
</script>

</head>

<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-950 text-white 
dark:from-gray-100 dark:via-gray-200 dark:to-gray-300 dark:text-black 
transition-colors duration-500">

<header class="flex justify-between items-center px-6 py-4 backdrop-blur-md bg-white/5 dark:bg-black/10 border-b border-white/10">

<h1 class="text-2xl font-semibold tracking-tight">
TaskFlow ✨
</h1>

<button 
onclick="toggleDark()" 
class="flex items-center gap-2 text-sm bg-white/10 hover:bg-white/20 
dark:bg-black/10 dark:hover:bg-black/20 
px-3 py-1.5 rounded-lg backdrop-blur-md transition-all duration-300">

🌙

</button>

</header>

<main class="flex min-h-screen">

<aside class="w-72 p-5 backdrop-blur-md bg-white/5 dark:bg-black/10 border-r border-white/10">

<h2 class="font-bold mb-4">Añadir tarea</h2>

<input 
id="tipoInput"
placeholder="Tipo de tarea"
class="w-full mb-3 px-3 py-2 rounded-lg bg-white/10 border border-white/10 
focus:outline-none focus:ring-2 focus:ring-indigo-500 
placeholder-gray-400 backdrop-blur-md transition"
/>

<input 
id="tareaInput"
placeholder="Descripción de la tarea"
class="w-full mb-3 px-3 py-2 rounded-lg bg-white/10 border border-white/10 
focus:outline-none focus:ring-2 focus:ring-indigo-500 
placeholder-gray-400 backdrop-blur-md transition"
/>

<select 
id="prioridadInput"
class="w-full mb-3 px-3 py-2 rounded-lg bg-white/10 border border-white/10 
focus:outline-none focus:ring-2 focus:ring-indigo-500 backdrop-blur-md transition">

<option value="alta">Alta 🔴</option>
<option value="media">Media 🟡</option>
<option value="baja">Baja 🟢</option>

</select>

<button 
onclick="agregarTarea()"
class="w-full bg-indigo-500 hover:bg-indigo-600 active:scale-95 
transition-all duration-200 text-white py-2 rounded-lg font-medium shadow-lg">

➕ Añadir

</button>

</aside>

<section id="taskContainer" class="flex-1 p-6 space-y-6">


</section>

</main>

<script>

function toggleDark(){

document.documentElement.classList.toggle("dark")

}

</script>

<script>

const contenedor = document.getElementById("taskContainer")

function agregarTarea(){

const tipo = document.getElementById("tipoInput").value
const tarea = document.getElementById("tareaInput").value
const prioridad = document.getElementById("prioridadInput").value

if(!tipo || !tarea) return

let grupo = document.getElementById("grupo-"+tipo)

if(!grupo){

grupo = document.createElement("div")

grupo.id = "grupo-"+tipo

grupo.className = "bg-white/5 dark:bg-black/10 backdrop-blur-md p-4 rounded-xl shadow-lg transition-all duration-300 hover:scale-[1.01]"

grupo.innerHTML = `
<div class="flex justify-between items-center mb-2">

<h2 class="text-xl font-semibold tracking-wide">${tipo}</h2>

<button onclick="eliminarGrupo('${tipo}')" class="text-red-400 hover:text-red-600 opacity-60 hover:opacity-100 transition">Eliminar</button>

</div>

<div class="space-y-2 lista"></div>
`

contenedor.appendChild(grupo)

}

const lista = grupo.querySelector(".lista")

let color = ""

if(prioridad=="alta") color="bg-red-500"
if(prioridad=="media") color="bg-yellow-500"
if(prioridad=="baja") color="bg-green-500"

const item = document.createElement("div")

item.style.opacity = "0"
item.style.transform = "translateY(10px)"

item.className="flex justify-between items-center border-l-4 border-indigo-500 bg-white/10 dark:bg-black/10 p-2 rounded-lg backdrop-blur-md hover:bg-white/20 transition"

if(prioridad=="alta") borde="border-red-500"
if(prioridad=="media") borde="border-yellow-500"
if(prioridad=="baja") borde="border-green-500"

item.innerHTML = `
<div class="flex items-center gap-2">

<input type="checkbox">

<span>${tarea}</span>

<span class="${color} text-white px-2 rounded text-xs">${prioridad}</span>

</div>

<button onclick="this.parentElement.remove()" class="text-red-500">-</button>
`

lista.appendChild(item)
setTimeout(()=>{
item.style.opacity="1"
item.style.transform="translateY(0)"
item.style.transition="all 0.3s ease"
},10)

}

function eliminarGrupo(tipo){

document.getElementById("grupo-"+tipo).remove()

}

function crearInicial(tipo,tarea,prioridad){

let grupo = document.getElementById("grupo-"+tipo)

if(!grupo){

grupo = document.createElement("div")

grupo.id = "grupo-"+tipo

grupo.className = "bg-slate-800 dark:bg-gray-200 p-4 rounded shadow"

grupo.innerHTML = `
<div class="flex justify-between items-center mb-2">

<h2 class="text-lg font-bold">${tipo}</h2>

<button onclick="eliminarGrupo('${tipo}')" class="text-red-500">Eliminar</button>

</div>

<div class="space-y-2 lista"></div>
`

contenedor.appendChild(grupo)

}

const lista = grupo.querySelector(".lista")

let color=""

if(prioridad=="alta") color="bg-red-500"
if(prioridad=="media") color="bg-yellow-500"
if(prioridad=="baja") color="bg-green-500"

const item = document.createElement("div")

item.className="flex justify-between items-center bg-slate-700 dark:bg-gray-300 p-2 rounded"

item.innerHTML=`

<div class="flex items-center gap-2">

<input type="checkbox">

<span>${tarea}</span>

<span class="${color} text-white px-2 rounded text-xs">${prioridad}</span>

</div>

<button onclick="this.parentElement.remove()" class="text-red-500">-</button>

`

lista.appendChild(item)

}

window.onload = function(){

crearInicial("Compra","Verduras","baja")
crearInicial("Compra","Detergente","media")
crearInicial("Compra","Traje para fin de año","alta")

crearInicial("Ejercicio","Salir a correr 10 km","media")
crearInicial("Ejercicio","Ir al gimnasio por la mañana","alta")
crearInicial("Ejercicio","Partido de pádel el finde","baja")

crearInicial("Trabajo","Terminar el proyecto antes del viernes","alta")
crearInicial("Trabajo","Presentar el prototipo de la página","media")

}

</script>

</body>
</html>
