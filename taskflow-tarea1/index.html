<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis tareas</title>


</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-950 via-slate-900 to-black text-white 
dark:from-gray-100 dark:via-gray-200 dark:to-gray-300 dark:text-black 
transition-colors duration-500">

<header class="flex justify-between items-center px-6 py-4 backdrop-blur-md bg-white/5 dark:bg-black/10 border-b border-white/10">

<h1 class="text-2xl font-semibold tracking-tight">
TaskFlow ✨
</h1>

<button id="modoBtn" onclick="toggleDark()" class="text-xl">
🌙
</button>

</header>

<main class="flex min-h-screen">

<aside class="w-72 p-5 backdrop-blur-md bg-white/5 dark:bg-black/10 border-r border-white/10">

<h2 class="font-bold mb-4">Añadir tarea</h2>

<input 
id="tipoInput"
placeholder="Tipo de tarea"
class="w-full mb-3 px-3 py-2 rounded-lg bg-white/10 border border-white/10 
focus:outline-none focus:ring-2 focus:ring-indigo-500 
placeholder-gray-400"
/>

<input 
id="tareaInput"
placeholder="Descripción de la tarea"
class="w-full mb-3 px-3 py-2 rounded-lg bg-white/10 border border-white/10 
focus:outline-none focus:ring-2 focus:ring-indigo-500 
placeholder-gray-400"
/>

<select 
id="prioridadInput"
class="w-full mb-3 px-3 py-2 rounded-lg bg-white/10 border border-white/10 
focus:outline-none focus:ring-2 focus:ring-indigo-500">

<option value="alta">Alta 🔴</option>
<option value="media">Media 🟡</option>
<option value="baja">Baja 🟢</option>

</select>

<button 
onclick="agregarTarea()"
class="w-full bg-indigo-500 hover:bg-indigo-600 hover:scale-[1.03] active:scale-95 transition-all duration-200 text-white py-2 rounded-lg font-medium shadow-lg">

➕ Añadir

</button>

</aside>

<section id="taskContainer" class="grid sm:grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 p-8 max-w-7xl mx-auto">

</section>

</main>

<script src="script.js"></script>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  darkMode: 'class'
}
</script>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

</body>
</html>
