<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Administrador de tareas TaskFlow para organizar y priorizar tus pendientes con una interfaz moderna.">
<title>TaskFlow - Gestor de tareas</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@keyframes heartbeat {
0%, 100% { transform: scale(1); }
14% { transform: scale(1.08); }
28% { transform: scale(1); }
42% { transform: scale(1.08); }
56% { transform: scale(1); }
}
.animate-heartbeat {
animation: heartbeat 1.4s ease-in-out infinite;
}
</style>
<script>
tailwind.config = {
  darkMode: 'class'
}
</script>
</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-950 via-slate-900 to-black text-white 
dark:from-gray-100 dark:via-gray-200 dark:to-gray-300 dark:text-black 
transition-colors duration-500">

<header class="flex flex-wrap justify-between items-center gap-3 px-6 py-4 backdrop-blur-md bg-white/5 dark:bg-black/10 border-b border-white/10 shadow-lg" role="banner">

        <h1 class="text-2xl font-semibold tracking-tight flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
          </svg>
          <span>TaskFlow</span>
        </h1>

<div class="flex items-center gap-2 sm:gap-4">

<a href="login.html" class="w-9 h-9 sm:w-10 sm:h-10 rounded-full border border-white/40 dark:border-black/40 bg-white/10 dark:bg-black/10 flex items-center justify-center hover:bg-white/20 dark:hover:bg-black/20 transition-all shadow-sm" aria-label="Acceder a tu perfil">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-4 h-4 sm:w-5 sm:h-5 text-white dark:text-black">
<path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4Zm0 2c-3.33 0-6 1.34-6 3v1c0 .55.45 1 1 1h10c.55 0 1-.45 1-1v-1c0-1.66-2.67-3-6-3Z"/>
</svg>
</a>

<div class="flex items-center gap-2 sm:gap-3 w-32 sm:w-32 md:w-auto" aria-label="Progreso de tareas">
<div class="w-32 sm:w-32 bg-white/20 dark:bg-black/20 rounded-full h-5 sm:h-5 overflow-hidden shadow-inner border border-white/10" role="progressbar" aria-label="Progreso completado" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
<div id="barraProgreso" class="h-5 sm:h-5 rounded-full transition-all duration-500 shadow-lg" style="width:0%; background:linear-gradient(90deg, #a855f7, #ec4899)"></div>
</div>
<span id="progresoTexto" class="text-xs sm:text-sm font-medium w-10 sm:w-12 text-right whitespace-nowrap flex-shrink-0" aria-live="polite">0%</span>
</div>

<button id="modoBtn" type="button" onclick="toggleDark()" aria-label="Cambiar modo oscuro/claro" class="text-lg sm:text-2xl hover:scale-110 transition-transform flex-shrink-0">
🌙
</button>

</div>

</header>

<main class="flex flex-col lg:flex-row w-full min-h-screen overflow-x-hidden" role="main">

<aside class="w-full sm:w-80 lg:w-72 lg:backdrop-blur-md lg:bg-white/5 lg:dark:bg-black/10 lg:border-r lg:border-white/10" aria-label="Panel de creación de tareas">

<button id="toggleSidebar" type="button" aria-label="Abrir o cerrar el formulario para añadir tarea" class="lg:hidden w-full px-4 sm:px-5 py-3 backdrop-blur-md bg-white/5 dark:bg-black/10 border-b border-white/10 flex items-center justify-between hover:bg-white/10 dark:hover:bg-black/20 transition-all">
<span class="font-bold text-sm sm:text-base">➕ Añadir tarea</span>
<span id="iconoToggle" class="text-lg sm:text-xl transition-transform duration-300">▼</span>
</button>

<div id="sidebarContent" class="lg:block w-full px-5 sm:px-6 py-4 sm:py-5 backdrop-blur-md bg-white/5 dark:bg-black/10 lg:border-b-0 border-b border-white/10 overflow-hidden transition-all duration-300 ease-in-out max-h-0 lg:max-h-none opacity-0 lg:opacity-100">

  <h2 class="text-lg font-semibold mb-4 hidden lg:block text-white/90 tracking-tight">Añadir tarea</h2>

<label for="tipoInput" class="sr-only">Grupo o categoría</label>
<input 
id="tipoInput"
placeholder="Grupo o categoría"
autocomplete="off"
class="w-full mb-2 sm:mb-3 px-3 py-2 text-sm sm:text-base rounded-lg bg-white/10 border border-white/10 
focus:outline-none focus:ring-2 focus:ring-indigo-500 
placeholder-gray-400"
/>

<label for="tareaInput" class="sr-only">Tarea a realizar</label>
<input 
id="tareaInput"
placeholder="Tarea a realizar"
autocomplete="off"
class="w-full mb-2 sm:mb-3 px-3 py-2 text-sm sm:text-base rounded-lg bg-white/10 border border-white/10 
focus:outline-none focus:ring-2 focus:ring-indigo-500 
placeholder-gray-400"
/>

<label for="prioridadInput" class="sr-only">Prioridad de la tarea</label>
<select 
id="prioridadInput"
class="w-full mb-3 px-3 py-2 text-sm sm:text-base rounded-lg bg-white/10 border border-white/10 
focus:outline-none focus:ring-2 focus:ring-indigo-500 text-gray-400">
<option value="" disabled selected hidden>Escoge la prioridad</option>
<option value="baja" class="text-white">Baja 🟢</option>
<option value="media" class="text-white">Media 🟡</option>
<option value="alta" class="text-white">Alta 🔴</option>
</select>

<button type="button" onclick="agregarTarea()" aria-label="Añadir tarea"
class="w-full bg-slate-700 hover:bg-slate-600 border border-slate-600/40 hover:border-slate-500/50 transition-all duration-200 text-white py-2 rounded-lg font-medium shadow-sm mb-2 sm:mb-4 flex items-center justify-center gap-2">
<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
<path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
</svg>
<span>Añadir tarea</span>
</button>

</div>

</aside>

<div class="flex-1">

<div id="searchSection" class="px-4 sm:px-8 pt-0 sm:pt-4 pb-4 sm:pb-3 transition-all duration-300 flex items-center gap-2">
  <div class="relative max-w-md flex-1">
    <label for="buscarInput" class="sr-only">Buscar tarea</label>
    <input
      id="buscarInput"
      oninput="buscar(this.value)"
      placeholder="🔎 Buscar tarea..."
      class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/10 backdrop-blur-md focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm"
    />
  </div>
  <button type="button" onclick="completarTodas()" aria-label="Completar todas las tareas" 
  class="inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-slate-700/60 hover:bg-slate-700/80 text-white border border-slate-600/40 hover:border-slate-500/60 transition-all">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
    </svg>
    <span>Completar todas</span>
  </button>
</div>

<section id="taskContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-6 px-4 sm:px-8 pb-4 sm:pb-8 max-w-7xl mx-auto mt-3 sm:mt-0" aria-label="Listado de tareas">
</section>

<div id="mensajeVacio" class="hidden text-center text-gray-400 dark:text-gray-600 italic mt-4 text-lg px-4 sm:px-8" aria-live="polite">
¡Crea tu primera tarea!
</div>

</div>

</main>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="src/api/client.js"></script>
<script src="script.js"></script>

</body>
</html>
