<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Regístrate en TaskFlow para vincular tu cuenta.">
<title>TaskFlow - Registro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { darkMode: 'class' }
</script>
<script>
// ==================== CONSTANTES DE CONFIGURACIÓN ====================

const REGISTER_CONFIG = {
  minNameLength: 2,
  maxNameLength: 100,
  minEmailLength: 5,
  maxEmailLength: 254,
  minPasswordLength: 6,
  maxPasswordLength: 128,
  tiempoAnimacionError: 2000,
  storageKeys: {
    email: "taskflow_email",
    modo: "modo"
  }
};

// Expresión regular para validar email en formato RFC5322 simplificado
const EMAIL_REGEX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

// ==================== FUNCIONES AUXILIARES ====================

/**
 * Aplica estilos visuales de error a un elemento del formulario.
 * Añade clases de error para proporcionar retroalimentación visual.
 * @param {HTMLElement} element - Elemento a marcar como error.
 * @param {boolean} show - Si true muestra el error, si false lo oculta.
 * @returns {void}
 */
function aplicarEstiloErrorRegister(element, show = true) {
  if (show) {
    element.classList.add("ring-2", "ring-red-500");
  } else {
    element.classList.remove("ring-2", "ring-red-500");
  }
}

/**
 * Limpia los estilos de error de múltiples elementos tras un delay.
 * @param {HTMLElement[]} elements - Array de elementos a limpiar.
 * @param {number} [delay] - Retraso en milisegundos antes de limpiar.
 * @returns {void}
 */
function limpiarEstilosErrorRegister(elements, delay = REGISTER_CONFIG.tiempoAnimacionError) {
  setTimeout(() => {
    elements.forEach(el => aplicarEstiloErrorRegister(el, false));
  }, delay);
}

/**
 * Valida el formato y longitud de un nombre de usuario.
 * @param {string} name - Nombre a validar.
 * @returns {Object} Objeto con propiedades: isValid (boolean) y message (string de error).
 */
function validarNombre(name) {
  if (!name) {
    return { isValid: false, message: "Por favor introduce tu nombre." };
  }
  if (name.length < REGISTER_CONFIG.minNameLength) {
    return { isValid: false, message: `El nombre debe tener al menos ${REGISTER_CONFIG.minNameLength} caracteres.` };
  }
  if (name.length > REGISTER_CONFIG.maxNameLength) {
    return { isValid: false, message: `El nombre es demasiado largo (máximo ${REGISTER_CONFIG.maxNameLength} caracteres).` };
  }
  return { isValid: true, message: "" };
}

/**
 * Valida el formato y longitud de un correo electrónico.
 * @param {string} email - Correo a validar.
 * @returns {Object} Objeto con propiedades: isValid (boolean) y message (string de error).
 */
function validarEmailRegister(email) {
  if (!email) {
    return { isValid: false, message: "Por favor introduce tu correo electrónico." };
  }
  if (email.length < REGISTER_CONFIG.minEmailLength) {
    return { isValid: false, message: "El correo debe tener al menos 5 caracteres." };
  }
  if (email.length > REGISTER_CONFIG.maxEmailLength) {
    return { isValid: false, message: "El correo es demasiado largo (máximo 254 caracteres)." };
  }
  if (!EMAIL_REGEX.test(email)) {
    return { isValid: false, message: "El formato del correo no es válido (ej: usuario@ejemplo.com)." };
  }
  return { isValid: true, message: "" };
}

/**
 * Valida el formato y longitud de una contraseña.
 * @param {string} password - Contraseña a validar.
 * @returns {Object} Objeto con propiedades: isValid (boolean) y message (string de error).
 */
function validarContraseñaRegister(password) {
  if (!password) {
    return { isValid: false, message: "Por favor introduce una contraseña." };
  }
  if (password.length < REGISTER_CONFIG.minPasswordLength) {
    return { isValid: false, message: `La contraseña debe tener al menos ${REGISTER_CONFIG.minPasswordLength} caracteres.` };
  }
  if (password.length > REGISTER_CONFIG.maxPasswordLength) {
    return { isValid: false, message: `La contraseña es demasiado larga (máximo ${REGISTER_CONFIG.maxPasswordLength} caracteres).` };
  }
  return { isValid: true, message: "" };
}

/**
 * Valida que dos contraseñas coincidan.
 * @param {string} password1 - Primera contraseña.
 * @param {string} password2 - Segunda contraseña (confirmación).
 * @returns {Object} Objeto con propiedades: isValid (boolean) y message (string de error).
 */
function validarContraseñasCoinciden(password1, password2) {
  if (password1 !== password2) {
    return { isValid: false, message: "Las contraseñas no coinciden." };
  }
  return { isValid: true, message: "" };
}

/**
 * Alterna el modo oscuro/claro y persiste la preferencia en localStorage.
 * Actualiza el icono del botón según el modo activo.
 * @returns {void}
 */
function toggleDarkRegister() {
  document.documentElement.classList.toggle("dark");
  const isDark = document.documentElement.classList.contains("dark");
  
  const boton = document.getElementById("modoRegisterBtn");
  if (boton) {
    boton.textContent = isDark ? "☀️" : "🌙";
  }
}

/**
 * Maneja el envío del formulario de registro.
 * Valida nombre, email y contraseñas con todas las comprobaciones necesarias.
 * Si la validación es correcta, guarda datos y redirige al login.
 * @param {Event} event - Evento de envío del formulario.
 * @returns {void}
 */
function manejarRegistro(event) {
  event.preventDefault();
  
  const nombreInput = document.getElementById("nombre");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const password2Input = document.getElementById("password2");
  const errorBox = document.getElementById("errorRegister");

  const nombre = nombreInput.value.trim();
  const email = emailInput.value.trim();
  const pass1 = passwordInput.value.trim();
  const pass2 = password2Input.value.trim();

  // Limpiar mensaje de error previo
  errorBox.textContent = "";
  errorBox.classList.add("hidden");

  const elementsWithError = [];
  let errorMessage = "";

  // Validar nombre
  const nameValidation = validarNombre(nombre);
  if (!nameValidation.isValid) {
    errorMessage = nameValidation.message;
    aplicarEstiloErrorRegister(nombreInput, true);
    elementsWithError.push(nombreInput);
  } else {
    aplicarEstiloErrorRegister(nombreInput, false);
  }

  // Validar email
  const emailValidation = validarEmailRegister(email);
  if (!emailValidation.isValid) {
    errorMessage = errorMessage || emailValidation.message;
    aplicarEstiloErrorRegister(emailInput, true);
    elementsWithError.push(emailInput);
  } else {
    aplicarEstiloErrorRegister(emailInput, false);
  }

  // Validar contraseña 1
  const password1Validation = validarContraseñaRegister(pass1);
  if (!password1Validation.isValid) {
    errorMessage = errorMessage || password1Validation.message;
    aplicarEstiloErrorRegister(passwordInput, true);
    elementsWithError.push(passwordInput);
  } else {
    aplicarEstiloErrorRegister(passwordInput, false);
  }

  // Validar contraseña 2 (solo si el primero pasó validación)
  if (password1Validation.isValid) {
    const password2Validation = validarContraseñaRegister(pass2);
    if (!password2Validation.isValid) {
      errorMessage = errorMessage || password2Validation.message;
      aplicarEstiloErrorRegister(password2Input, true);
      elementsWithError.push(password2Input);
    } else {
      aplicarEstiloErrorRegister(password2Input, false);
      
      // Validar coincidencia de contraseñas
      const matchValidation = validarContraseñasCoinciden(pass1, pass2);
      if (!matchValidation.isValid) {
        errorMessage = errorMessage || matchValidation.message;
        aplicarEstiloErrorRegister(passwordInput, true);
        aplicarEstiloErrorRegister(password2Input, true);
        elementsWithError.push(passwordInput, password2Input);
      }
    }
  }

  // Si hay errores, mostrar y retornar
  if (errorMessage) {
    errorBox.textContent = errorMessage;
    errorBox.classList.remove("hidden");
    limpiarEstilosErrorRegister(elementsWithError);
    return;
  }

  // Demo: redirigir al login (no se persiste en LocalStorage)
  window.location.href = "login.html";
}

/**
 * Inicializa la página cargando preferencias guardadas.
 * Sincroniza el modo oscuro/claro desde localStorage.
 * @returns {void}
 */
function inicializarPaginaRegister() {
  // Ajustar icono del modo según estado actual (no se lee LocalStorage)
  const toggleBtn = document.getElementById("modoRegisterBtn");
  if (toggleBtn) {
    toggleBtn.textContent = document.documentElement.classList.contains("dark") ? "☀️" : "🌙";
  }

  // Adjuntar evento al formulario de registro
  const form = document.getElementById("formRegister");
  if (form) {
    form.addEventListener("submit", manejarRegistro);
  }
}

// ==================== INICIALIZACIÓN ====================

// Ejecutar inicialización cuando el DOM esté listo
document.addEventListener("DOMContentLoaded", inicializarPaginaRegister);
</script>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-950 via-slate-900 to-black text-white 
dark:from-gray-100 dark:via-gray-200 dark:to-gray-300 dark:text-black 
transition-colors duration-500 flex items-center justify-center px-4">

<div class="w-full max-w-md">
  <header class="flex justify-between items-center mb-6">
    <a href="login.html" class="inline-flex items-center gap-2 text-sm text-white/80 dark:text-black/70 hover:text-white dark:hover:text-black transition">
      <span class="text-lg">←</span>
      <span>Volver a acceso</span>
    </a>
    <button id="modoRegisterBtn" type="button" onclick="toggleDarkRegister()" aria-label="Cambiar modo oscuro/claro" class="text-2xl hover:scale-110 transition-transform">
      🌙
    </button>
  </header>

  <main class="backdrop-blur-md bg-white/5 dark:bg-black/10 border border-white/10 rounded-2xl shadow-2xl p-6">
    <h1 class="text-xl font-semibold tracking-tight">Crear cuenta</h1>
    <p class="text-xs text-white/70 dark:text-black/60 mt-1">Vincula tu correo para acceder desde cualquier dispositivo.</p>

    <form id="formRegister" class="space-y-4 mt-5" novalidate>
      <div>
        <label for="nombre" class="block text-sm mb-1">Nombre</label>
        <input
          id="nombre"
          type="text"
          autocomplete="off"
          placeholder="Tu nombre"
          class="w-full px-3 py-2 rounded-lg bg-white/10 dark:bg-black/5 border border-white/20 focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-white/60 dark:placeholder-black/50"
          required
        />
      </div>

      <div>
        <label for="email" class="block text-sm mb-1">Correo electrónico</label>
        <input
          id="email"
          type="email"
          autocomplete="off"
          placeholder="tucorreo@ejemplo.com"
          class="w-full px-3 py-2 rounded-lg bg-white/10 dark:bg-black/5 border border-white/20 focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-white/60 dark:placeholder-black/50"
          required
        />
      </div>

      <div>
        <label for="password" class="block text-sm mb-1">Contraseña</label>
        <input
          id="password"
          type="password"
          autocomplete="new-password"
          placeholder="Mínimo 6 caracteres"
          class="w-full px-3 py-2 rounded-lg bg-white/10 dark:bg-black/5 border border-white/20 focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-white/60 dark:placeholder-black/50"
          required
        />
      </div>

      <div>
        <label for="password2" class="block text-sm mb-1">Repite la contraseña</label>
        <input
          id="password2"
          type="password"
          autocomplete="new-password"
          placeholder="Repite la contraseña"
          class="w-full px-3 py-2 rounded-lg bg-white/10 dark:bg-black/5 border border-white/20 focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-white/60 dark:placeholder-black/50"
          required
        />
      </div>

      <p id="errorRegister" class="hidden text-sm text-red-300 dark:text-red-600 bg-red-500/20 dark:bg-red-200/40 border border-red-400/50 rounded-lg px-3 py-2"></p>

      <button
        type="submit"
        class="w-full bg-indigo-500 hover:bg-indigo-600 hover:scale-[1.02] active:scale-95 transition-all duration-200 text-white py-2.5 rounded-lg font-medium shadow-lg"
      >
        Crear cuenta
      </button>
    </form>

    <p class="mt-4 text-xs text-white/60 dark:text-black/60 text-center">
      Demo: este registro no crea usuarios reales todavía, pero deja preparado el flujo para implementarlo después.
    </p>
  </main>
</div>

</body>
</html>
